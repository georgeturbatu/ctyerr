name: main

on:
  schedule:
    - cron: '*/19 * * * *'
  workflow_dispatch:

concurrency:
  group: docker21
  cancel-in-progress: true

jobs:
  run-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Docker container
        run: |
          docker run \
            --cap-add=NET_ADMIN \
            --device=/dev/net/tun \
            jikimaru/bui1
